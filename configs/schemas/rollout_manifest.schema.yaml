schema_version: 0.1
schema_id: rollout_manifest
description: >
  Manifest contract for a generated fixed rollout corpus. The manifest records
  config provenance, expected counts, actual counts, validation results, and
  output paths.

required_fields:
  schema_version:
    type: string
  builder:
    type: string
    expected: RolloutCorpusBuilder
  created_at_utc:
    type: string
  rollout_config:
    type: object
    required_keys:
      - path
      - sha256
  source_material_config:
    type: object
    required_keys:
      - path
      - sha256
  output_jsonl:
    type: string
  output_jsonl_sha256:
    type: string
  target_counts:
    type: object
    required_keys:
      - role_records
      - default_records
      - records_total
  actual_counts:
    type: object
    required_keys:
      - role_records
      - default_records
      - records_total
      - role_groups
      - question_categories
      - role_source_status
  validation:
    type: object
    required_keys:
      - passed
      - errors
      - warnings

validation_rules:
  - Actual role/default/total counts must match target_counts.
  - There must be exactly 48 roles, 20 selected questions, and 4 default prompt families for v0.
  - Each role group must contain 16 roles.
  - All selected questions must be unique.
  - All rollout ids must be unique.
  - Initial corpus records must not contain trait-axis or instruction-condition fields.

notes:
  - This is a corpus manifest, not an experiment run manifest.
  - Later experiment runs should still create meta/run_manifest.json, meta/status.json, and checkpoints/progress.json under artifacts/runs.
