schema_version: 0.1
schema_id: rollout_record
description: >
  Contract for one fixed text stimulus used to construct and analyze
  Assistant-Axis-like directions across Pythia checkpoints.

required_fields:
  rollout_id:
    type: string
    description: Stable unique id for this rollout record.
  record_type:
    type: string
    allowed:
      - role
      - default
    description: Whether the record belongs to a role prompt or a default prompt family.
  question_id:
    type: integer
    description: Imported Assistant Axis question id.
  question_category:
    type: string
    description: Category copied from the selected question pool.
  question:
    type: string
    description: Human-readable question text.
  prompt_text:
    type: string
    description: The full text stimulus to feed into generation or activation extraction.
  readout_policy:
    type: string
    allowed:
      - response_token_mean
    description: Intended activation pooling policy for this record.
  source:
    type: object
    description: Provenance, source config ids, and construction notes.

role_record_fields:
  role_id:
    type: string
    required_when: record_type == role
  role_group:
    type: string
    required_when: record_type == role
    allowed:
      - assistant_like
      - non_assistant_non_neutral
      - neutral_control
  role_instruction_variant_id:
    type: string
    required_when: record_type == role
  role_instruction:
    type: string
    required_when: record_type == role
  role_source_status:
    type: string
    required_when: record_type == role
    allowed:
      - imported_local_core_roles
      - planned_upstream_import

default_record_fields:
  default_prompt_id:
    type: string
    required_when: record_type == default
  default_prompt:
    type: string
    required_when: record_type == default

forbidden_for_initial_corpus:
  - trait_axis_id
  - condition
  - polarity
  - instruction_positive
  - instruction_negative
  - instruction_neutral

id_policy:
  role: role__<role_id>__<question_id>__<variant_id>
  default: default__<default_prompt_id>__<question_id>

notes:
  - The initial corpus is default-vs-role, not explicit trait-instruction.
  - Response text can be added later if fixed rollouts are generated by an external model.
  - Early activation debugging may use prompt_text directly, but final activation extraction should preserve prompt/response spans when generated responses exist.
