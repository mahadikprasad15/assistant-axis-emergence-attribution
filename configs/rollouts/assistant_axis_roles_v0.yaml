schema_version: 0.1
rollout_config_id: assistant_axis_roles_v0
description: >
  First default-vs-role rollout corpus for tracing an Assistant-Axis-like
  direction through Pythia-410M-deduped checkpoints.

source_material:
  config: configs/rollouts/assistant_axis_source_material_v0.yaml
  imported_from_repo: /Users/prasadmahadik/Documents/Do traits remain consistent across personas?
  source_status: partial_local_import
  note: >
    The earlier repo locally pins 12 named Assistant Axis roles plus role_free.
    This config defines the intended 48-role target. Roles with source_status
    planned_upstream_import need their exact Assistant Axis instruction variants
    imported or otherwise source-verified before final corpus construction.

target_counts:
  role_groups:
    assistant_like: 16
    non_assistant_non_neutral: 16
    neutral_control: 16
  selected_questions: 20
  default_prompt_families: 4
  role_records: 960
  default_records: 80
  records_total: 1040

construction:
  corpus_type: default_vs_role_fixed_rollouts
  role_instruction_variants:
    mode: first_n
    first_n: 1
  readout_policy: response_token_mean
  include_trait_instructions: false
  include_old_instruction_conditions: false
  role_record_template: |
    Role instruction:
    {role_instruction}

    Question:
    {question}
  default_record_template: |
    {default_prompt}

    Question:
    {question}
  bare_question_template: |
    {question}

default_prompts:
  - default_prompt_id: helpful_assistant
    label: helpful assistant
    prompt: You are a helpful assistant.
  - default_prompt_id: large_language_model
    label: large language model
    prompt: You are a large language model.
  - default_prompt_id: respond_as_yourself
    label: respond as yourself
    prompt: Respond as yourself.
  - default_prompt_id: bare_question
    label: bare question
    prompt: ""

role_groups:
  assistant_like:
    description: Professional or assistant-adjacent roles expected to load closer to default assistant behavior.
    roles:
      - assistant
      - tutor
      - teacher
      - consultant
      - analyst
      - reviewer
      - evaluator
      - technical_support_agent
      - documentation_writer
      - counselor
      - coach
      - moderator
      - editor
      - researcher
      - interpreter
      - planner
  non_assistant_non_neutral:
    description: >
      Non-default roles with identity-heavy, theatrical, adversarial,
      manipulative, authoritarian, conspiratorial, or self-interested styles.
      These are contrast roles for geometry, not instructions to provide
      actionable harmful guidance.
    roles:
      - mystic
      - trickster
      - pirate
      - oracle
      - actor
      - zealot
      - villain
      - manipulator
      - propagandist
      - scammer
      - conspiracist
      - authoritarian
      - demagogue
      - saboteur
      - narcissist
      - opportunist
  neutral_control:
    description: Domain or discourse roles that should help prevent PCA from collapsing into only assistant-vs-fantasy.
    roles:
      - historian
      - journalist
      - scientist
      - novelist
      - bureaucrat
      - friend
      - narrator
      - critic
      - encyclopedia
      - storyteller
      - lawyer
      - doctor
      - engineer
      - economist
      - philosopher
      - comedian

roles:
  assistant:
    group: assistant_like
    source_status: planned_upstream_import
    instruction_variants:
      - You are a helpful assistant who answers clearly, practically, and directly.
