validation_expectations:
  role_count: 48
  question_count: 20
  default_prompt_count: 4
  expected_role_records: 960
  expected_default_records: 80
  expected_total_records: 1040
  required_question_categories:
    - moral_social
    - interpersonal_conflict
    - risk_decision
    - evidence_truth
    - planning
    - explanation_teaching
    - technical_problem_solving
    - emotional_support
  blocker_before_final_corpus: >
    Replace or verify planned_upstream_import role instructions with exact
    source-pinned Assistant Axis role instructions where available. The current
    local config is sufficient for reading and planning, but the final rollout
    corpus should record which instructions are source-pinned versus locally
    drafted.
