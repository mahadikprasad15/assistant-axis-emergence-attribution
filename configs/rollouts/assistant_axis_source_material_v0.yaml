old_trait_geometry_shape:
  traits: 6
  roles: 6
  questions: 40
  role_instruction_variants: 2
  conditions:
    - instruction_positive
    - instruction_negative
    - instruction_neutral
  records_total: 8640
  note: >
    These old records are explicit trait-instruction records. They are not the
    main corpus for this project because initial AA construction needs
    default-vs-role fixed texts without trait-pole instructions.

new_pythia_rollout_target:
  role_groups:
    assistant_like: 16
    non_assistant_non_neutral: 16
    neutral_control: 16
  questions: 20
  default_prompt_families: 4
  role_records: 960
  default_records: 80
  records_total: 1040
  semantics: default_vs_role_assistant_axis

reuse_policy:
  use_directly:
    - Assistant Axis source URLs and provenance fields.
    - Locally pinned role instruction variants for roles already present in core_roles.yaml.
    - The 40 selected Assistant Axis questions as a candidate pool.
    - Manifest, validation, stable-id, and builder/runner patterns.
  adapt:
    - Expand role set from local imported roles to 48 target roles.
    - Reduce selected questions from 40 to 20 while preserving all 8 categories.
    - Replace old trait-instruction records with default-vs-role rollout records.
  do_not_use_directly:
    - Existing generated JSONLs under data/prompts/assistant_axis_6x6_v001.
    - Trait axes from assistant_axis_6x6_v0.
    - instruction_positive, instruction_negative, instruction_neutral as initial AA conditions.

